<!DOCTYPE html>
<html lang="en" data-theme="brass">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Formatomat — Der Automat für alle Formate</title>
    <meta name="description" content="Convert, pretty-print and minify JSON, YAML, XML, TOML, INI and PHP. Fast, accurate, privacy-friendly. No tracking, no ads.">
    <meta name="theme-color" content="#f0e8d2">

    <link rel="canonical" href="https://formatomat.net/">

    <!-- Open Graph -->
    <meta property="og:title" content="Formatomat — The automat for every format">
    <meta property="og:description" content="Convert, pretty-print and minify JSON, YAML and more. No tracking.">
    <meta property="og:url" content="https://formatomat.net/">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://formatomat.net/assets/img/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://formatomat.net/assets/img/og-image.png">

    <!-- Favicon + PWA -->
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Formatomat">

    <!-- Structured Data -->
    <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "SoftwareApplication",
            "name": "Formatomat",
            "description": "Convert, pretty-print and minify JSON, YAML and more — privacy-friendly, no tracking.",
            "url": "https://formatomat.net",
            "applicationCategory": "DeveloperApplication",
            "operatingSystem": "All",
            "offers": { "@type": "Offer", "price": "0.00", "priceCurrency": "EUR" }
        }
    </script>

    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
<div class="page-wrapper">
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 80 80" aria-hidden="true">
                    <!-- Stylized automat: a box with a coin slot and a lever -->
                    <rect x="8" y="14" width="64" height="54" rx="3" fill="var(--accent)" stroke="var(--fg)" stroke-width="2"/>
                    <rect x="14" y="20" width="52" height="22" rx="1" fill="var(--bg)" stroke="var(--fg)" stroke-width="1.5"/>
                    <!-- Screen dots -->
                    <circle cx="22" cy="31" r="1.2" fill="var(--accent-dim)"/>
                    <circle cx="28" cy="31" r="1.2" fill="var(--accent-dim)"/>
                    <circle cx="34" cy="31" r="1.2" fill="var(--accent-dim)"/>
                    <circle cx="40" cy="31" r="1.2" fill="var(--highlight)"/>
                    <circle cx="46" cy="31" r="1.2" fill="var(--accent-dim)"/>
                    <circle cx="52" cy="31" r="1.2" fill="var(--accent-dim)"/>
                    <circle cx="58" cy="31" r="1.2" fill="var(--accent-dim)"/>
                    <!-- Slot -->
                    <rect x="22" y="50" width="36" height="4" rx="1" fill="var(--fg)"/>
                    <!-- Lever -->
                    <circle cx="64" cy="60" r="3" fill="var(--highlight)" stroke="var(--fg)" stroke-width="1.5"/>
                    <!-- Feet -->
                    <rect x="12" y="68" width="6" height="4" fill="var(--fg)"/>
                    <rect x="62" y="68" width="6" height="4" fill="var(--fg)"/>
                </svg>
                <h1 class="logo-text">Formatomat</h1>
            </div>
            <p class="tagline">Der Automat für alle Formate.</p>
        </div>

        <div class="header-right">
            <div class="select-group">
                <label for="languageSelect" class="sr-only">Language</label>
                <select id="languageSelect" class="chunky-select"></select>
            </div>
            <div class="select-group">
                <label for="themeSelect" class="sr-only">Theme</label>
                <select id="themeSelect" class="chunky-select"></select>
            </div>
        </div>
    </header>

    <main class="main">
        <!-- Format selector -->
        <div class="format-bar" role="tablist" aria-label="Input format">
            <div class="format-bar-label" id="inputFormatLabel">Input</div>
            <div class="format-tabs" id="inputFormatTabs"></div>
            <div class="format-bar-status" id="inputStatus" aria-live="polite"></div>
        </div>

        <!-- Input / Output panels -->
        <div class="panels">
            <section class="panel panel-input">
                <div class="panel-header">
                    <label class="panel-label" id="inputLabel">Input</label>
                    <div class="panel-actions">
                        <button type="button" class="btn-icon" id="pasteBtn" aria-label="Paste from clipboard" data-tooltip="Paste from clipboard">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <rect x="8" y="2" width="8" height="4" rx="1"/>
                                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
                            </svg>
                        </button>
                        <button type="button" class="btn-icon" id="clearInputBtn" aria-label="Clear input" data-tooltip="Clear input">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M3 6h18"/>
                                <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                            </svg>
                        </button>
                        <button type="button" class="btn-icon" id="expandInputBtn" aria-label="Expand" data-tooltip="Expand">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
                                <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
                                <path d="M3 16v3a2 2 0 0 0 2 2h3"/>
                                <path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="error-banner" id="inputError" aria-live="polite" hidden></div>
                <div class="editor-wrap" id="inputEditorWrap"></div>
                <div class="panel-footer">
                    <span class="panel-meta" id="inputMeta"></span>
                </div>
            </section>

            <div class="control-column">
                <div class="control-group">
                    <label class="control-label" id="outputFormatLabel">Output</label>
                    <div class="format-tabs compact" id="outputFormatTabs"></div>
                </div>

                <div class="control-group">
                    <label class="control-label" id="actionLabel">Action</label>
                    <div class="action-buttons">
                        <button type="button" class="btn-chunky active" id="prettyBtn" data-action="pretty">Pretty</button>
                        <button type="button" class="btn-chunky" id="minifyBtn" data-action="minify">Minify</button>
                    </div>
                </div>

                <div class="control-group" id="indentGroup">
                    <label class="control-label" for="indentSelect" id="indentLabel">Indent</label>
                    <select id="indentSelect" class="chunky-select"></select>
                </div>

                <div class="control-group">
                    <label class="control-label" id="optionsLabel">Options</label>
                    <label class="checkbox-row">
                        <input type="checkbox" id="sortKeysCheckbox">
                        <span id="sortKeysLabel">Sort keys</span>
                    </label>
                </div>

                <div class="arrow-indicator" aria-hidden="true">
                    <svg viewBox="0 0 40 24" fill="none">
                        <path d="M2 12 H32" stroke="var(--accent)" stroke-width="2"/>
                        <path d="M26 6 L34 12 L26 18" stroke="var(--accent)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </div>

            <section class="panel panel-output">
                <div class="panel-header">
                    <label class="panel-label" id="outputLabel">Output</label>
                    <div class="panel-actions">
                        <button type="button" class="btn-icon" id="copyOutputBtn" aria-label="Copy to clipboard" data-tooltip="Copy to clipboard">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <rect x="9" y="9" width="13" height="13" rx="2"/>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                            </svg>
                        </button>
                        <button type="button" class="btn-icon" id="downloadBtn" aria-label="Download" data-tooltip="Download">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <path d="M7 10l5 5 5-5"/>
                                <path d="M12 15V3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="editor-wrap" id="outputEditorWrap"></div>
                <div class="panel-footer">
                    <span class="panel-meta" id="outputMeta"></span>
                    <span class="panel-delta" id="sizeDelta"></span>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer"> 
        <div id="footerSupport"></div>
        <div id="footerLinks">
            <a href="#" id="aboutLink"></a>
            <span aria-hidden="true"> · </span>
            <a href="/impressum.html" id="impressumLink"></a>
            <span aria-hidden="true"> · </span>
            <a href="/datenschutz.html" id="privacyLink"></a>
            <span aria-hidden="true"> · </span>
            <a href="https://github.com/stefanradermacher/formatomat" target="_blank" rel="noopener">GitHub</a>
            <span aria-hidden="true"> · </span>
            <span>&copy; 2026 Stefan Radermacher</span>
        </div>
    </footer>

    <!-- Support Modal -->
    <div id="supportModal" class="modal" aria-hidden="true">
        <div class="modal-backdrop" data-modal-close></div>
        <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="supportModalTitle">
            <button type="button" class="modal-close" aria-label="Close" data-modal-close>&times;</button>
            <h2 id="supportModalTitle"></h2>
            <div id="supportModalBody"></div>
        </div>
    </div>

    <!-- About Modal -->
    <div id="aboutModal" class="modal" aria-hidden="true">
        <div class="modal-backdrop" data-modal-close></div>
        <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="aboutModalTitle">
            <button type="button" class="modal-close" aria-label="Close" data-modal-close>&times;</button>
            <h2 id="aboutModalTitle">Formatomat</h2>
            <div id="aboutModalBody"></div>
        </div>
    </div>

    <!-- Privacy Modal -->
    <div id="privacyModal" class="modal" aria-hidden="true">
        <div class="modal-backdrop" data-modal-close></div>
        <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="privacyModalTitle">
            <button type="button" class="modal-close" aria-label="Close" data-modal-close>&times;</button>
            <h2 id="privacyModalTitle"></h2>
            <div id="privacyModalBody"></div>
        </div>
    </div>

    <!-- Impressum Modal -->
    <div id="impressumModal" class="modal" aria-hidden="true">
        <div class="modal-backdrop" data-modal-close></div>
        <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="impressumModalTitle">
            <button type="button" class="modal-close" aria-label="Close" data-modal-close>&times;</button>
            <h2 id="impressumModalTitle"></h2>
            <div id="impressumModalBody"></div>
        </div>
    </div>
</div>

<p id="fatalError" hidden></p>

<script type="module" src="assets/js/app.js"></script>
</body>
</html>
